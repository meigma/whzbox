name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Moon Toolchain
        uses: moonrepo/setup-toolchain@261c62cb5b0f580c7be7c8cd0f023a2e96756095 # v0.6.4
        with:
          auto-setup: true
          cache-base: main

      - name: Restore Go Caches
        id: go-cache-restore
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/go
            ~/.cache/go-build
            ~/.cache/golangci-lint
          key: ${{ runner.os }}-go-moon-${{ hashFiles('go.mod', 'go.sum', '.golangci.yml', '.moon/toolchains.yml') }}
          restore-keys: |
            ${{ runner.os }}-go-moon-

      - name: Restore npm Cache
        id: npm-cache-restore
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-moon-${{ hashFiles('docs/package.json', 'docs/package-lock.json', '.moon/toolchains.yml') }}
          restore-keys: |
            ${{ runner.os }}-npm-moon-

      - name: Run Moon CI
        run: moon ci --summary minimal

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Run GoReleaser Check
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: v2.14.3
          args: check

      - name: Run GoReleaser Snapshot
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: v2.14.3
          args: release --snapshot --clean --skip=sign

      - name: Smoke test stamped snapshot binary
        shell: bash
        run: |
          set -euo pipefail

          host_os="$(go env GOHOSTOS)"
          host_arch="$(go env GOHOSTARCH)"
          bin="$(find dist -type f -name whzbox | grep "/whzbox_${host_os}_${host_arch}_" | head -n 1 || true)"

          if [[ -z "${bin}" ]]; then
            echo "failed to locate host binary in dist/" >&2
            find dist -maxdepth 2 -type f | sort >&2
            exit 1
          fi

          version_output="$("${bin}" version)"
          flag_output="$("${bin}" --version)"

          printf 'version output: %s\n' "${version_output}"
          printf 'flag output: %s\n' "${flag_output}"

          [[ "${version_output}" == *"v0.0.0-dev"* ]]
          [[ "${flag_output}" == *"v0.0.0-dev"* ]]

          for output in "${version_output}" "${flag_output}"; do
            [[ "${output}" =~ \([[:xdigit:]]{7,40}\)\ built\ [0-9]{4}-[0-9]{2}-[0-9]{2}T ]]
            [[ "${output}" != *"(none)"* ]]
            [[ "${output}" != *"built unknown"* ]]
          done

      - name: Save Go Caches
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.go-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/go
            ~/.cache/go-build
            ~/.cache/golangci-lint
          key: ${{ steps.go-cache-restore.outputs.cache-primary-key }}

      - name: Save npm Cache
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.npm-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.npm
          key: ${{ steps.npm-cache-restore.outputs.cache-primary-key }}
