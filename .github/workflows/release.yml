name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v3.0.5

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: v2.14.3
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}

      - name: Smoke test released binary version metadata
        shell: bash
        run: |
          set -euo pipefail

          host_os="$(go env GOHOSTOS)"
          host_arch="$(go env GOHOSTARCH)"
          expected_version="${GITHUB_REF_NAME}"
          bin="$(find dist -type f -name whzbox | grep "/whzbox_${host_os}_${host_arch}_" | head -n 1 || true)"

          if [[ -z "${bin}" ]]; then
            echo "failed to locate host binary in dist/" >&2
            find dist -maxdepth 2 -type f | sort >&2
            exit 1
          fi

          version_output="$("${bin}" version)"
          flag_output="$("${bin}" --version)"

          printf 'version output: %s\n' "${version_output}"
          printf 'flag output: %s\n' "${flag_output}"

          [[ "${version_output}" == *"${expected_version}"* ]]
          [[ "${flag_output}" == *"${expected_version}"* ]]

          for output in "${version_output}" "${flag_output}"; do
            [[ "${output}" =~ \([[:xdigit:]]{7,40}\)\ built\ [0-9]{4}-[0-9]{2}-[0-9]{2}T ]]
            [[ "${output}" != *"(none)"* ]]
            [[ "${output}" != *"built unknown"* ]]
          done

      - name: Attest released files listed in checksums.txt
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ./dist/checksums.txt
