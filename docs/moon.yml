# https://moonrepo.dev/docs/config/project
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'

tasks:
  build:
    command: 'npm run build'
    inputs:
      - 'index.md'
      - 'tutorials/**/*'
      - 'how-to/**/*'
      - 'reference/**/*'
      - 'explanation/**/*'
      - 'src/**/*'
      - 'static/**/*'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'docusaurus.config.ts'
      - 'sidebars.ts'
    outputs:
      - 'build'
    options:
      cache: true

  typecheck:
    command: 'npm run typecheck'
    inputs:
      - 'src/**/*'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'docusaurus.config.ts'
      - 'sidebars.ts'
    options:
      cache: true
